    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accordion-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .accordion-header {
            transition: all 0.3s ease;
        }
        .accordion-header:hover {
            background: rgba(16, 185, 129, 0.05);
        }
        .accordion-header.active {
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid #10b981;
        }
        .gradient-text {
            background: linear-gradient(135deg, #a2e0b1 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .terpene-bar {
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        .terpene-fill {
            height: 100%;
            background: #10b981;
            border-radius: 3px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-tab {
            color: #10b981;
            border-bottom: 2px solid #10b981;
        }
        .content-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .content-wrapper.open {
            max-height: 3000px; /* Large enough to fit content */
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>

        function toggleAccordion(id) {
            const allContent = document.querySelectorAll('.content-wrapper');
            const allHeaders = document.querySelectorAll('.accordion-header');
            const allArrows = document.querySelectorAll('[id^="arrow-"]');
            
            const targetContent = document.getElementById(`content-${id}`);
            const targetHeader = document.getElementById(`header-${id}`);
            const targetArrow = document.getElementById(`arrow-${id}`);

            const isOpening = !targetContent.classList.contains('open');

            // Close others
            allContent.forEach(c => c.classList.remove('open'));
            allHeaders.forEach(h => h.classList.remove('active'));
            allArrows.forEach(a => a.style.transform = 'rotate(0deg)');

            if (isOpening) {
                targetContent.classList.add('open');
                targetHeader.classList.add('active');
                targetArrow.style.transform = 'rotate(180deg)';
                currentId = id;
                
                // Animate Terpene Bars
                setTimeout(() => {
                    const fills = document.querySelectorAll(`.terp-fill-${id}`);
                    fills.forEach((fill, i) => {
                        fill.style.width = cultivars[id].terps.list[i].v;
                    });
                }, 400);

                // Scroll into view nicely
                setTimeout(() => {
                    targetHeader.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 300);
            }
        }

            const tabs = document.querySelectorAll(`.inner-tab-${strainId}`);
            
            views.forEach(v => v.classList.add('hidden'));
            tabs.forEach(t => t.classList.remove('active-tab', 'text-white'));
            tabs.forEach(t => t.classList.add('text-slate-500'));

            document.getElementById(`view-${strainId}-${tabType}`).classList.remove('hidden');
            document.getElementById(`tab-${strainId}-${tabType}`).classList.add('active-tab', 'text-white');
            document.getElementById(`tab-${strainId}-${tabType}`).classList.remove('text-slate-500');
        }

        window.onload = init;
    </script>
</body>
</html>
